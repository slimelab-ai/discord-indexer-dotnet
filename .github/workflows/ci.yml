name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore discord-indexer.sln

      - name: Format check
        run: dotnet format discord-indexer.sln --verify-no-changes --no-restore

      - name: Build
        run: dotnet build discord-indexer.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test discord-indexer.sln --configuration Release --no-build --logger trx --collect:"XPlat Code Coverage"
